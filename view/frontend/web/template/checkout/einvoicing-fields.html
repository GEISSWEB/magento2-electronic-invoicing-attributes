<div class="payment-option _collapsible opc-payment-additional einvoicing-info"
     data-bind="visible: isVisible, mageInit: {'collapsible':{'openedState': '_active'}}">
    <div class="payment-option-title field choice" data-role="title">
        <span class="action action-toggle" id="block-einvoicing-heading" role="heading" aria-level="2">
            <!-- ko i18n: 'E-Invoicing Information'--><!-- /ko -->
        </span>
    </div>
    <div class="payment-option-content" data-role="content">
        <div class="payment-option-inner fieldset">
            <div class="field" data-bind="visible: isBuyerReferenceVisible">
                <label class="label" for="einvoicing-buyer-reference">
                    <span data-bind="i18n: 'Buyer Reference'">Buyer Reference</span>
                </label>
                <div class="control _with-tooltip">
                    <input type="text"
                           id="einvoicing-buyer-reference"
                           name="einvoicing_buyer_reference"
                           class="input-text"
                           data-bind="value: buyerReference, valueUpdate: 'afterkeydown'"
                           autocomplete="off"/>
                    <div class="field-tooltip toggle">
                        <span class="field-tooltip-action action-help"
                              tabindex="0"
                              data-toggle="dropdown"
                              data-bind="mageInit: {'dropdown':{'activeClass': '_active', 'parent': '.field-tooltip.toggle'}}"></span>
                        <div class="field-tooltip-content"
                             data-target="dropdown"
                             data-bind="text: buyerReferenceTooltip"></div>
                    </div>
                </div>
            </div>
            <div class="field" data-bind="visible: isProjectReferenceVisible">
                <label class="label" for="einvoicing-project-reference">
                    <span data-bind="i18n: 'Project Reference'">Project Reference</span>
                </label>
                <div class="control _with-tooltip">
                    <input type="text"
                           id="einvoicing-project-reference"
                           name="einvoicing_project_reference"
                           class="input-text"
                           data-bind="value: projectReference, valueUpdate: 'afterkeydown'"
                           autocomplete="off"/>
                    <div class="field-tooltip toggle">
                        <span class="field-tooltip-action action-help"
                              tabindex="0"
                              data-toggle="dropdown"
                              data-bind="mageInit: {'dropdown':{'activeClass': '_active', 'parent': '.field-tooltip.toggle'}}"></span>
                        <div class="field-tooltip-content"
                             data-target="dropdown"
                             data-bind="text: projectReferenceTooltip"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
